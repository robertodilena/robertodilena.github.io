<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dettaglio progetto — Roberto Di Lena." />
    <title>Progetto | Roberto Di Lena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <script>
      document.documentElement.classList.add('js-reveal');
    </script>
  </head>
  <body>
    <a href="#main" class="skip-link">Vai al contenuto</a>
    <header
      id="site-header"
      class="reveal-on-scroll"
      data-reveal-immediate
      data-reveal-delay="0"
      aria-label="Intestazione sito"
    ></header>

    <main id="main">
      <div id="project-missing" hidden>
        <header class="page-hero reveal-on-scroll" data-reveal-immediate data-reveal-delay="40">
          <h1>Progetto non trovato</h1>
          <p class="lead">
            Il link non è valido oppure la scheda non è più disponibile.
          </p>
          <p><a href="index.html">← Torna all’elenco progetti</a></p>
        </header>
      </div>

      <div id="project-root" hidden>
        <nav class="breadcrumb" aria-label="Percorso">
          <a href="index.html">Progetti</a>
          <span aria-hidden="true"> / </span>
          <span id="project-crumb-current"></span>
        </nav>

        <div
          id="project-hero-wrap"
          class="hero-visual project-page-hero reveal-on-scroll"
          data-reveal-immediate
          data-reveal-delay="70"
          hidden
        >
          <img id="project-hero-img" src="" alt="" width="1400" height="600" loading="lazy" />
        </div>

        <header
          class="page-hero project-page-title reveal-on-scroll"
          data-reveal-immediate
          data-reveal-delay="130"
        >
          <div id="project-tags" class="tags project-title-tags"></div>
          <h1 id="project-title"></h1>
        </header>

        <div id="project-banner" class="stub-banner" hidden></div>

        <div id="project-body" class="prose"></div>

        <p class="project-back-link reveal-on-scroll">
          <a href="index.html">← Altri progetti</a>
        </p>
      </div>
    </main>

    <footer id="site-footer" class="reveal-on-scroll"></footer>

    <script src="../js/projects-data.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/projects-loader.js"></script>
    <script src="../js/scroll-reveal.js"></script>
    <script src="../js/project-detail.js"></script>
    <script>
      PortfolioLayout.inject();
      document.addEventListener('DOMContentLoaded', function () {
        if (window.ScrollReveal) ScrollReveal.init();
      });
    </script>
  </body>
</html>
