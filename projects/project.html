<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dettaglio progetto — Roberto Di Lena." />
    <title>Progetto | Roberto Di Lena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/home-cinematic.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  </head>
  <body class="page-cinematic" data-cinematic="project">
    <a href="#main" class="skip-link">Vai al contenuto</a>

    <div class="cine-mesh" aria-hidden="true">
      <div class="cine-mesh__layer"></div>
      <div class="cine-mesh__layer cine-mesh__layer--b"></div>
    </div>

    <div class="cine-cursor" aria-hidden="true">
      <div class="cine-cursor__ring"></div>
      <div class="cine-cursor__dot"></div>
    </div>

    <header id="site-header" aria-label="Intestazione sito"></header>

    <main id="main" class="cine-shell cine-project-detail main--project">
      <div class="cine-project-detail__frame">
        <div id="project-missing" hidden>
          <section
            class="cine-section cine-project-detail--missing"
            aria-labelledby="missing-title"
          >
            <h1 id="missing-title">Progetto non trovato</h1>
            <p class="lead">
              Il link non è valido oppure la scheda non è più disponibile.
            </p>
            <p>
              <a href="../index.html" data-cursor-hover>← Torna alla home</a>
            </p>
          </section>
        </div>

        <div id="project-root" hidden>
          <nav class="cine-breadcrumb" aria-label="Percorso">
            <a href="../index.html" data-cursor-hover>Home</a>
            <span aria-hidden="true"> / </span>
            <span id="project-crumb-current"></span>
          </nav>

          <div id="project-hero-wrap" class="cine-project-detail__hero" hidden>
            <img id="project-hero-img" src="" alt="" width="1400" height="600" loading="lazy" />
          </div>

          <header class="cine-project-detail__title-block">
            <div id="project-tags" class="cine-project-detail__tags"></div>
            <h1 id="project-title"></h1>
          </header>

          <div id="project-banner" class="cine-project-detail__banner" hidden></div>

          <div class="cine-project-detail__body-wrap">
            <div id="project-body" class="prose"></div>
          </div>

          <p class="cine-project-detail__back">
            <a href="../index.html#progetti" data-cursor-hover>← Torna alla home</a>
          </p>
        </div>
      </div>
    </main>

    <script src="../js/projects-data.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/projects-loader.js"></script>
    <script src="../js/home-cinematic.js"></script>
    <script src="../js/project-detail.js"></script>
    <script>
      PortfolioLayout.inject();
    </script>
  </body>
</html>
