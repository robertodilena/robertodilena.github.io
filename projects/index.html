<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Progetti — integrazioni Power Platform, Business Central e Dataverse." />
    <title>Progetti | Roberto Di Lena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <script>
      document.documentElement.classList.add('js-reveal');
    </script>
  </head>
  <body>
    <a href="#main" class="skip-link">Vai al contenuto</a>
    <header
      id="site-header"
      class="reveal-on-scroll"
      data-reveal-immediate
      data-reveal-delay="0"
      aria-label="Intestazione sito"
    ></header>

    <main id="main">
      <header class="page-hero reveal-on-scroll" data-reveal-immediate data-reveal-delay="40">
        <h1>Progetti</h1>
        <p class="lead">
          Panoramica di alcuni progetti su cui ho lavorato.
        </p>
      </header>

      <div id="project-list-root" class="project-list"></div>
    </main>

    <footer id="site-footer" class="reveal-on-scroll"></footer>

    <script src="../js/projects-data.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/projects-loader.js"></script>
    <script src="../js/scroll-reveal.js"></script>
    <script src="../js/project-list.js"></script>
    <script>
      PortfolioLayout.inject();
      document.addEventListener('DOMContentLoaded', function () {
        if (window.ScrollReveal) ScrollReveal.init();
      });
    </script>
  </body>
</html>
